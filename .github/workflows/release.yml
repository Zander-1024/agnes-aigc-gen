name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: agnes-aigc-gen

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag and validate Cargo.toml version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          CARGO_VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version $VERSION)"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive: tar.gz
            bin: agnes-aigc-gen

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            archive: tar.gz
            bin: agnes-aigc-gen

          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x86_64
            archive: tar.gz
            bin: agnes-aigc-gen

          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            archive: tar.gz
            bin: agnes-aigc-gen

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive: zip
            bin: agnes-aigc-gen.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ARCHIVE="${{ env.BIN_NAME }}-${VERSION}-${PLATFORM}.tar.gz"
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          strip "$BIN" 2>/dev/null || true
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $platform = "${{ matrix.platform }}"
          $archive = "${{ env.BIN_NAME }}-${version}-${platform}.zip"
          $bin = "target/${{ matrix.target }}/release/${{ matrix.bin }}"
          Compress-Archive -Path $bin -DestinationPath $archive -Force
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          ls -la
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
